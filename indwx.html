<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="link.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=refresh" />
</head>
<body class="m-0 p-0 border-box flex justify-center items-center bg-[hsl(0,0%,86%)] ">

      <!-- font-family: "Poppins", sans-serif; -->
<main class="bg-[hsl(0,100%,100%)] w-150 font-bold px-10 mt-20 pb-10 rounded-br-[100px] rounded-t-[10px] rounded-bl-[10px] h-120">
   <section class="flex gap-5 border-b pt-4 pb-8 relative mr-5 uppercase  text-[hsl(0,1%,44%)]">
     <div class="flex flex-col ">
        <label for="day">Day</label>
        <input class="border-2 font-bold border-[hsla(0,1%,44%,0.5)] py-2 px-6 " id="day" type="number" placeholder="DD" min="1" max="31" maxlength="2">
    </div>

    <div class="flex flex-col">
        <label for="month">Month</label>
        <input class="border-2 py-2 px-6 uppercase font-bold border-[hsla(0,1%,44%,0.5)]" id="month" type="number" placeholder="MM" min="1" max="12" maxlength="2">
    </div>

    <div class="flex flex-col">
        <label for="year">Year</label>
        <input class="border-2 font-bold py-2 px-6 border-[hsla(0,1%,44%,0.5)] text" id="year" type="number" placeholder="YYYY" min="1900" max="2100" maxlength="4">
    </div>

   
   
       <button id="btn" class="cursor-pointer bg-[hsl(259,100%,65%)] w-15 flex justify-center items-center rounded-full h-15 absolute right-[-3px] bottom-[-20px]"> <img src="./assets/images/icon-arrow.svg" alt=""></button>
    
   </section>
 <p id="timertext" class="py-3"></p>
   <section class="text-[50px]">
<h1 class=""><span class="text-[hsl(259,100%,65%)]" id="years"> -- </span>Years</h1>
<h1 class=""><span class="text-[hsl(259,100%,65%)]" id="months"> -- </span>Months</h1>
<h1 class=""><span id="days" class="text-[hsl(259,100%,65%)]"> -- </span>Days</h1>
   </section>

<div class="flex justify-end items-end px-5 relative">
<button id="refresh" class="cursor-pointer absolute"><svg class="bg-[hsl(259,100%,65%)] rounded-full bg-w-20" xmlns="http://www.w3.org/2000/svg" height="65px" viewBox="0 -960 960 960" width="65px" fill="#ffffff"><path d="M481.62-180q-125.04 0-212.56-87.5-87.52-87.51-87.52-212.44 0-124.93 87.52-212.49Q356.58-780 481.54-780q78 0 141.02 34.17 63.03 34.17 105.65 94.4V-780h50.25v231.9H546.57v-50.26h157.99q-34.59-59.82-92.35-95.6-57.77-35.78-130.67-35.78-104.51 0-177.13 72.61-72.62 72.61-72.62 177.1t72.65 177.13q72.65 72.64 177.19 72.64 79.88 0 145.27-45.69 65.38-45.69 91.46-120.67h52.41q-27.64 97.26-107.73 156.94Q582.94-180 481.62-180Z"/></svg></button>
</div>

<p id="result" class="text-center pt-12">How Long Have You Spent On Earth</p>
</main>











<script src="agecalculator.js"></script>
</body>
</html>
